# Local dev hooks mirroring the CI green gate (ruff + secret hygiene).
# Install: uvx pre-commit install    Run all: uvx pre-commit run --all-files
# mypy is run in CI (needs the full dev environment); not duplicated here.
repos:
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v5.0.0
    hooks:
      - id: trailing-whitespace
      - id: end-of-file-fixer
      - id: check-yaml
      - id: check-toml
      - id: check-merge-conflict
      - id: check-added-large-files
      - id: detect-private-key

  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.15.17
    hooks:
      - id: ruff
        name: ruff (lint)

  - repo: local
    hooks:
      - id: detect-secrets-baseline
        name: detect-secrets (baseline)
        entry: uvx --from detect-secrets detect-secrets-hook --baseline .secrets.baseline
        language: system
        types: [text]
      - id: secret-shape-guard
        name: secret-shape guard
        entry: python3 scripts/secret_shape_guard.py
        language: system
        pass_filenames: false
