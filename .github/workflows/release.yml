name: Release

# Publishes to PyPI when a GitHub Release is published.
#
# Uses PyPI Trusted Publishing (OIDC) — no API token/secret. Configure a trusted
# publisher on PyPI (https://pypi.org/manage/account/publishing/) with:
#   Project:     nirs4all-cluster
#   Owner:       GBeurier
#   Repository:  nirs4all-cluster
#   Workflow:    release.yml
#   Environment: pypi
# Then publish a GitHub Release (tag e.g. v0.1.0) to trigger this workflow.

on:
  release:
    types: [published]
  workflow_dispatch:

# Least-privilege default; the publish job below narrows to id-token: write only.
permissions:
  contents: read

jobs:
  build:
    name: Build distributions
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      - name: Install uv
        uses: astral-sh/setup-uv@d4b2f3b6ecc6e67c4457f6d3e41ec42d3d0fcb86 # v5
      - name: Build sdist + wheel
        run: uv build
      - name: Twine check (strict metadata)
        run: uvx twine check --strict dist/*
      - name: Upload distributions
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: dist
          path: dist/*

  publish-pypi:
    name: Publish to PyPI (Trusted Publishing)
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: pypi
      url: https://pypi.org/p/nirs4all-cluster
    permissions:
      id-token: write          # REQUIRED for OIDC Trusted Publishing
    steps:
      - name: Download distributions
        uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093 # v4
        with:
          name: dist
          path: dist
      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@cef221092ed1bacb1cc03d23a2d87d1d172e277b # release/v1
