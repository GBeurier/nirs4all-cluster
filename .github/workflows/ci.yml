name: CI

on:
  push:
    branches: [main, rc/**]
  pull_request:
    branches: [main, rc/**]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

# Least-privilege default token scope; every job here only reads the repo.
permissions:
  contents: read

jobs:
  secrets:
    name: secret scan
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - name: Install uv
        uses: astral-sh/setup-uv@11f9893b081a58869d3b5fccaea48c9e9e46f990 # v8.3.2
        with:
          enable-cache: true
      - name: Detect new secrets
        run: git ls-files -z | xargs -0 uvx --from detect-secrets detect-secrets-hook --baseline .secrets.baseline
      - name: Reject token-shaped CLI examples
        run: python3 scripts/secret_shape_guard.py

  test:
    name: test (py${{ matrix.python-version }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.11", "3.12", "3.13"]
    steps:
      - uses: actions/checkout@v7

      - name: Install uv
        uses: astral-sh/setup-uv@11f9893b081a58869d3b5fccaea48c9e9e46f990 # v8.3.2
        with:
          enable-cache: true

      - name: Set up Python ${{ matrix.python-version }}
        run: uv python install ${{ matrix.python-version }}

      # Dev environment only — nirs4all is intentionally NOT installed, so the
      # integration suite self-skips and the no-nirs4all suite runs.
      - name: Sync dev environment
        run: uv sync --extra dev --python ${{ matrix.python-version }}

      - name: Ruff
        run: uv run ruff check .

      - name: Mypy
        run: uv run mypy nirs4all_cluster

      - name: Pytest
        run: uv run pytest -q

  docs:
    name: docs build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - name: Install uv
        uses: astral-sh/setup-uv@11f9893b081a58869d3b5fccaea48c9e9e46f990 # v8.3.2
        with:
          enable-cache: true
      - name: Set up Python
        run: uv python install 3.12
      - name: Sync docs environment
        run: uv sync --extra docs --python 3.12
      - name: Sphinx build (warnings as errors)
        run: uv run sphinx-build -W -b html docs docs/_build/html

  package:
    name: build & check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - name: Install uv
        uses: astral-sh/setup-uv@11f9893b081a58869d3b5fccaea48c9e9e46f990 # v8.3.2
        with:
          enable-cache: true
      - name: Build sdist + wheel
        run: uv build
      - name: Twine check (strict metadata)
        run: uvx twine check --strict dist/*
      - name: Upload distributions
        uses: actions/upload-artifact@v7
        with:
          name: dist
          path: dist/*
